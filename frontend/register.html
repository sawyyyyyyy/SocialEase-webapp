<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Social Ease - Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-container": "#604f7f",
                    "surface-container-highest": "#e1e2e5",
                    "surface-tint": "#445f8c",
                    "on-tertiary-fixed": "#141c28",
                    "on-tertiary-container": "#363f4c",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "secondary-fixed": "#ebdcff",
                    "surface-variant": "#e1e2e5",
                    "on-primary": "#ffffff",
                    "inverse-primary": "#acc7fb",
                    "surface-container-high": "#e7e8eb",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed": "#d6e3ff",
                    "inverse-on-surface": "#f0f1f4",
                    "secondary-container": "#dac5fd",
                    "inverse-surface": "#2e3133",
                    "outline-variant": "#c4c6d0",
                    "on-surface": "#191c1e",
                    "on-error": "#ffffff",
                    "secondary": "#675686",
                    "primary": "#445f8c",
                    "background": "#f8f9fc",
                    "on-primary-fixed-variant": "#2b4773",
                    "surface-dim": "#d9dadd",
                    "surface-container-low": "#f2f3f6",
                    "surface": "#f8f9fc",
                    "primary-container": "#8faadc",
                    "on-primary-container": "#213e69",
                    "tertiary-fixed": "#dbe3f4",
                    "secondary-fixed-dim": "#d2bdf5",
                    "on-primary-fixed": "#001b3e",
                    "on-background": "#191c1e",
                    "surface-container": "#edeef1",
                    "tertiary-container": "#a2aaba",
                    "on-secondary-fixed-variant": "#4f3e6d",
                    "primary-fixed-dim": "#acc7fb",
                    "on-surface-variant": "#43474f",
                    "surface-bright": "#f8f9fc",
                    "on-tertiary-fixed-variant": "#3f4755",
                    "on-error-container": "#93000a",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "on-secondary-fixed": "#22123f",
                    "outline": "#747780",
                    "tertiary": "#575f6d",
                    "tertiary-fixed-dim": "#bfc7d7"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap-lg": "40px",
                    "gutter": "16px",
                    "stack-gap-sm": "12px",
                    "container-padding": "24px",
                    "stack-gap-md": "24px",
                    "unit": "8px"
            },
            "fontFamily": {
                    "h2": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "button": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "label-caps": ["Plus Jakarta Sans"],
                    "h1": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "button": ["16px", {"lineHeight": "20px", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "h1": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-glow {
            box-shadow: 0 0 20px 5px rgba(143, 170, 220, 0.1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }
        .animate-in { animation: slideUp 0.4s ease-out; }
        .animate-out { animation: slideDown 0.25s ease-in forwards; }
        .breathing-bubble {
            background: radial-gradient(circle at center, #dac5fd 0%, #8faadc 100%);
            filter: blur(40px);
            opacity: 0.2;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar suppressed for Transactional screen per Shell Visibility Rule -->
<main class="flex-grow flex items-center justify-center p-4">
<div class="w-full max-w-lg mx-auto bg-white rounded-2xl shadow-xl shadow-primary/5 border border-surface-container p-8 animate-in">
<div class="text-center mb-6">
<div class="w-12 h-12 bg-primary-container rounded-full flex items-center justify-center mx-auto mb-3">
<span class="material-symbols-outlined text-on-primary-container text-3xl" data-icon="psychology" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<h2 class="font-h2 text-h2 text-on-surface">Begin Your Journey</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Create your account to start your path toward tranquility.</p>
</div>
<form action="#" class="space-y-stack-gap-sm" id="registerForm">
<div id="registerError" class="hidden p-4 bg-error-container/20 text-error rounded-xl text-sm font-medium mb-4"></div>
<!-- Name Field -->
<div class="space-y-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="registerName">FULL NAME</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-3 bg-tertiary-fixed/30 border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none text-on-surface" id="registerName" placeholder="Full name" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="registerEmail">EMAIL ADDRESS</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-tertiary-fixed/30 border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none text-on-surface" id="registerEmail" placeholder="Email address" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="registerPassword">PASSWORD</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-3 bg-tertiary-fixed/30 border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none text-on-surface" id="registerPassword" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="registerConfirm">CONFIRM PASSWORD</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="verified_user">verified_user</span>
<input class="w-full pl-12 pr-4 py-3 bg-tertiary-fixed/30 border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none text-on-surface" id="registerConfirm" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-3 py-2">
<input class="mt-1 rounded border-outline-variant text-primary focus:ring-primary h-4 w-4" id="registerTerms" type="checkbox"/>
<label class="text-[14px] text-on-surface-variant leading-tight" for="registerTerms">
                                I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>.
                            </label>
</div>
<!-- Submit Button -->
<button class="w-full py-4 bg-primary text-on-primary font-button text-button rounded-full soft-glow active:scale-95 transition-all flex items-center justify-center gap-2 mt-4 hover:bg-on-primary-fixed-variant" type="submit">
                            Create Account
                            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>

<p class="text-center font-body-md text-on-surface-variant mt-6">
                        Already have an account? <a class="text-primary font-bold hover:underline transition-link" href="login.html">Sign In</a>
</p>
</div>
</main>
<!-- Footer for Branding Consistency -->
<footer class="p-container-padding text-center">
<p class="font-label-caps text-outline">© <span id="copyrightYear">2026</span> Social Ease</p>
</footer>
<script src="app.js"></script>
</body></html>
