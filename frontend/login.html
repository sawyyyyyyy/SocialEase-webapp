<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#604f7f",
                        "surface-container-highest": "#e1e2e5",
                        "surface-tint": "#445f8c",
                        "on-tertiary-fixed": "#141c28",
                        "on-tertiary-container": "#363f4c",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#ebdcff",
                        "surface-variant": "#e1e2e5",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#acc7fb",
                        "surface-container-high": "#e7e8eb",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#d6e3ff",
                        "inverse-on-surface": "#f0f1f4",
                        "secondary-container": "#dac5fd",
                        "inverse-surface": "#2e3133",
                        "outline-variant": "#c4c6d0",
                        "on-surface": "#191c1e",
                        "on-error": "#ffffff",
                        "secondary": "#675686",
                        "primary": "#445f8c",
                        "background": "#f8f9fc",
                        "on-primary-fixed-variant": "#2b4773",
                        "surface-dim": "#d9dadd",
                        "surface-container-low": "#f2f3f6",
                        "surface": "#f8f9fc",
                        "primary-container": "#8faadc",
                        "on-primary-container": "#213e69",
                        "tertiary-fixed": "#dbe3f4",
                        "secondary-fixed-dim": "#d2bdf5",
                        "on-primary-fixed": "#001b3e",
                        "on-background": "#191c1e",
                        "surface-container": "#edeef1",
                        "tertiary-container": "#a2aaba",
                        "on-secondary-fixed-variant": "#4f3e6d",
                        "primary-fixed-dim": "#acc7fb",
                        "on-surface-variant": "#43474f",
                        "surface-bright": "#f8f9fc",
                        "on-tertiary-fixed-variant": "#3f4755",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#22123f",
                        "outline": "#747780",
                        "tertiary": "#575f6d",
                        "tertiary-fixed-dim": "#bfc7d7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap-lg": "40px",
                        "gutter": "16px",
                        "stack-gap-sm": "12px",
                        "container-padding": "24px",
                        "stack-gap-md": "24px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "h2": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "button": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-caps": ["Plus Jakarta Sans"],
                        "h1": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "button": ["16px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "h1": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .breathing-bg {
            background: radial-gradient(circle at 50% 50%, #ebdcff 0%, #f8f9fc 70%);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 4px rgba(143, 170, 220, 0.2);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }
        .animate-in { animation: slideUp 0.4s ease-out; }
        .animate-out { animation: slideDown 0.25s ease-in forwards; }
    </style>
</head>
<body class="bg-background font-body-md text-on-background min-h-screen flex items-center justify-center p-container-padding breathing-bg">
<main class="w-full max-w-md">
<!-- Logo & Branding Section -->
<div class="flex flex-col items-center mb-stack-gap-lg">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-stack-gap-sm shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="psychology" data-weight="fill" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface">Social Ease</h1>
<p class="text-xs text-slate-500 font-medium mt-1 uppercase tracking-widest">Calm Companion</p>
</div>
<!-- Login Card -->
<div class="glass-card p-10 rounded-xl shadow-xl shadow-primary/5 animate-in">
<div class="mb-stack-gap-md text-center">
<h2 class="font-h2 text-h2 text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-md text-on-surface-variant">Take a deep breath and sign in.</p>
</div>
<form class="space-y-stack-gap-md" id="loginForm">
<div id="loginError" class="hidden p-4 bg-error-container/20 text-error rounded-xl text-sm font-medium"></div>
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-wider" for="loginEmail">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-secondary-fixed/20 border-transparent rounded-lg focus:bg-white focus:ring-primary focus:border-primary transition-all duration-300 input-glow font-body-md placeholder:text-outline/60" id="loginEmail" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-wider" for="loginPassword">Password</label>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-secondary-fixed/20 border-transparent rounded-lg focus:bg-white focus:ring-primary focus:border-primary transition-all duration-300 input-glow font-body-md placeholder:text-outline/60" id="loginPassword" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary text-on-primary font-button text-button py-4 rounded-full shadow-lg shadow-primary/20 hover:scale-[0.98] active:scale-95 transition-all duration-200" type="submit">
                    Sign In
                </button>
</form>

</div>
<!-- Footer Link -->
<div class="mt-stack-gap-md text-center">
<p class="font-body-md text-on-surface-variant">
                New to Social Ease? 
                <a class="text-primary font-semibold hover:underline underline-offset-4 decoration-primary-container transition-link" href="register.html">Create an account</a>
</p>
</div>
<!-- Decorative Breathing Element -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-[600px] h-[600px] bg-secondary-fixed/30 blur-[100px] rounded-full -z-10"></div>
</main>
<script src="app.js"></script>
</body></html>
